<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/sass/main.scss" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Att göra</title>
  </head>
  <body>
    <header>
      <img src="/bilder/tslab2logo.svg" alt="" />
      <h1>Att-göra-lista</h1>
    </header>
    <main>
      <section id="addnewtodo">
        <h2>Lägg till ny att-göra</h2>
        <div id="addcomponents">
          <input type="text" id="todoinput" />
          <button id="addtodo">
            Lägg till
            <img src="/symboler/add.svg" alt="" />
          </button>
        </div>
      </section>
      <section id="todoscontainer">
        <h2>Att göra:</h2>
        <div id="todos">
          <ul>
            <li>
              <input type="checkbox" />
              Handla
            </li>
            <br />
            <li>
              <input type="checkbox" />
              Gymma
            </li>
          </ul>
        </div>
      </section>
      <footer>
        <p>JOBA1602</p>
        <p>DT208G</p>
        <p>Programmering i TypeScript</p>
      </footer>
    </main>
    <script type="module" src="/src/ts/main.ts"></script>
  </body>
</html>
