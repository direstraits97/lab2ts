<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/sass/main.scss">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet">
    <title>Att göra</title>
  </head>
  <body>
    <header>
      <img src="/bilder/tslab2logo.svg" alt="">
      <h1>Att-göra-lista</h1>
    </header>
    <main>
      <section id="addnewtodo">
        <h2>Lägg till ny att-göra</h2>
        <div id="addnewtodocontainer">
          <form id="addcomponents">
            <div id="errorcontainer"></div>
            <label for="todoinput">Beskrivning:</label>
            <input type="text" id="todoinput">
            <label for="priorityinput">
              Prioritetsnivå 1-3 (1 = Väldigt viktig, 3 = Inte särskilt viktig):
            </label>
            <input type="text" id="priorityinput">
            <button id="addtodo">
              Lägg till
              <img src="/symboler/add.svg" alt="">
            </button>
          </form>
        </div>
      </section>
      <section id="todoscontainer">
        <h2>Att göra:</h2>
        <div id="todos">
          <ul id="todolist"></ul>
        </div>
      </section>
      <footer>
        <p>JOBA1602</p>
        <p>DT208G</p>
        <p>Programmering i TypeScript</p>
      </footer>
    </main>
    <script type="module" src="/src/ts/main.ts"></script>
  </body>
</html>
